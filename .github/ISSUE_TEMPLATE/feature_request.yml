name: Feature request
description: Suggest a new capability or improvement
title: "feat: <short description>"
labels: [enhancement]
body:
  - type: textarea
    id: use-case
    attributes:
      label: What problem are you trying to solve?
      description: Describe the end-user use case before the implementation.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Additional context
