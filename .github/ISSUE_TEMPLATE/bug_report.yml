name: Bug report
description: Something doesn't behave the way it should
title: "bug: <short description>"
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill the sections below so we can reproduce the issue.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: how-to-reproduce
    attributes:
      label: How can we reproduce it?
      description: Step-by-step (config snippet, curl command, agent setup).
      placeholder: |
        1. Configure the agent with …
        2. Run heartbeat
        3. See error …
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: input
    id: pkg-version
    attributes:
      label: Package version
      description: Version of @felipefontoura/paperclip-adapter-hermes-gateway
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: paperclip-version
    attributes:
      label: Paperclip server version / build date
    validations:
      required: false
  - type: input
    id: hermes-version
    attributes:
      label: Hermes Agent version
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Paste any relevant log output (remember to redact bearers / cookies).
      render: shell
