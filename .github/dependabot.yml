version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      runtime:
        dependency-type: production
        update-types: [patch, minor]
      dev-tools:
        dependency-type: development
        update-types: [patch, minor]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
